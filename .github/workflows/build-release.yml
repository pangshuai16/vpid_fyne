name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python 3.8.20 (XP compatible, community patch)
      shell: powershell
      run: |
        $url = "https://raw.githubusercontent.com/adang1345/PythonVista/master/3.8.20/python-3.8.20-full.exe"
        $installer = "$env:TEMP\python-3.8.20-full.exe"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading Python 3.8.20 x86 (community XP patch)..."
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
        Write-Host "Installing Python 3.8.20..."
        Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python38 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
        if (Test-Path "C:\Python38\python.exe") {
            Write-Host "Python 3.8.20 installed successfully"
            & "C:\Python38\python.exe" --version
        } else {
            Write-Error "Python 3.8.20 installation failed"
            exit 1
        }

    - name: Add Python 3.8 to PATH
      shell: powershell
      run: |
        "C:\Python38" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "C:\Python38\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller==4.10

    - name: Check Python syntax
      run: |
        python -m py_compile main.py
        python -m py_compile src/__init__.py
        python -m py_compile src/device_info.py
        python -m py_compile src/usb_scanner.py
        python -m py_compile src/gui/__init__.py
        python -m py_compile src/gui/main_window.py
        python -m py_compile src/gui/device_list.py
        python -m py_compile src/gui/device_detail.py

    - name: Verify imports
      run: |
        python -c "from src.device_info import USBDevice; print('device_info OK')"
        python -c "from src.usb_scanner import scan_usb_devices, compare_devices; print('usb_scanner OK')"
        python -c "from src.gui.main_window import MainWindow; print('main_window OK')"
        python -c "from src.gui.device_list import DeviceListPanel; print('device_list OK')"
        python -c "from src.gui.device_detail import DeviceDetailPanel; print('device_detail OK')"

    - name: Build executable with PyInstaller
      shell: pwsh
      run: |
        pyinstaller vpid_viewer.spec --clean --noconfirm
        if (Test-Path dist/vpid_viewer.exe) {
            Write-Host "Build successful: dist/vpid_viewer.exe"
            Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
        } else {
            Write-Error "Build failed: exe not found in dist/"
            exit 1
        }

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: "${{ github.ref_name }} (XP Compatible)"
        files: dist/vpid_viewer.exe
        generate_release_notes: true
