name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python 3.8.20 (XP compatible, community patch)
      shell: powershell
      run: |
        $url = "https://raw.githubusercontent.com/adang1345/PythonVista/master/3.8.20/python-3.8.20-full.exe"
        $installer = "$env:TEMP\python-3.8.20-full.exe"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading Python 3.8.20 x86 (community XP patch)..."
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
        Write-Host "Installing Python 3.8.20..."
        Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python38 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
        if (Test-Path "C:\Python38\python.exe") {
            Write-Host "Python 3.8.20 installed successfully"
            & "C:\Python38\python.exe" --version
        } else {
            Write-Error "Python 3.8.20 installation failed"
            exit 1
        }

    - name: Add Python 3.8 to PATH
      shell: powershell
      run: |
        "C:\Python38" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "C:\Python38\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies
      run: |
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller==4.10

    - name: Download and set up XP-compatible Qt 5.15.17 (cxxzhang build)
      shell: powershell
      run: |
        Write-Host "Setting up XP-compatible Qt 5.15.17..."
        
        # Note: cxxzhang/qt5.15.17 provides Windows XP-compatible Qt builds
        # We'll download and extract it to replace PyQt5's default Qt libraries
        $qtUrl = "https://github.com/cxxzhang/qt5.15.17/releases/download/v5.15.17/qt5.15.17-msvc2019-x86_xp.zip"
        $qtZip = "$env:TEMP\qt5.15.17-xp.zip"
        $qtExtractPath = "$env:TEMP\qt5.15.17-xp"
        
        Write-Host "Downloading Qt 5.15.17 XP-compatible build..."
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        try {
            Invoke-WebRequest -Uri $qtUrl -OutFile $qtZip -UseBasicParsing
            Write-Host "Download complete"
        } catch {
            Write-Warning "Failed to download Qt 5.15.17 XP build: $_"
            Write-Warning "Will proceed with standard PyQt5 Qt libraries (may not support XP)"
            exit 0  # Don't fail the build, just skip XP compatibility
        }
        
        Write-Host "Extracting Qt libraries..."
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($qtZip, $qtExtractPath)
        
        # Find PyQt5 installation path
        $pyqtPath = python -c "import PyQt5; import os; print(os.path.dirname(PyQt5.__file__))"
        Write-Host "PyQt5 installed at: $pyqtPath"
        
        # Check if Qt subdirectory exists and backup
        $pyqtQtPath = Join-Path $pyqtPath "Qt5"
        if (Test-Path $pyqtQtPath) {
            $pyqtQtBackup = "$pyqtQtPath.backup"
            if (Test-Path $pyqtQtBackup) {
                Remove-Item -Path $pyqtQtBackup -Recurse -Force
            }
            Rename-Item -Path $pyqtQtPath -NewName "$pyqtQtPath.backup"
            Write-Host "Backed up original PyQt5 Qt libraries"
        }
        
        # Copy XP-compatible Qt libraries
        $extractedQtPath = Get-ChildItem -Path $qtExtractPath -Directory | Select-Object -First 1
        if ($extractedQtPath) {
            Copy-Item -Path $extractedQtPath.FullName -Destination $pyqtQtPath -Recurse -Force
            Write-Host "Successfully replaced PyQt5 Qt libraries with XP-compatible version"
        } else {
            Write-Warning "Could not find extracted Qt directory. Using original PyQt5 libraries."
            if (Test-Path "$pyqtQtPath.backup") {
                Rename-Item -Path "$pyqtQtPath.backup" -NewName $pyqtQtPath
            }
        }

    - name: Check Python syntax
      run: |
        python -m py_compile main.py
        python -m py_compile src/__init__.py
        python -m py_compile src/device_info.py
        python -m py_compile src/usb_scanner.py
        python -m py_compile src/gui/__init__.py
        python -m py_compile src/gui/main_window.py
        python -m py_compile src/gui/device_list.py
        python -m py_compile src/gui/device_detail.py

    - name: Verify imports
      run: |
        python -c "from src.device_info import USBDevice; print('device_info OK')"
        python -c "from src.usb_scanner import scan_usb_devices, compare_devices; print('usb_scanner OK')"
        python -c "from src.gui.main_window import MainWindow; print('main_window OK')"
        python -c "from src.gui.device_list import DeviceListPanel; print('device_list OK')"
        python -c "from src.gui.device_detail import DeviceChangePanel; print('device_detail OK')"

    - name: Build executable with PyInstaller
      shell: pwsh
      run: |
        pyinstaller vpid_viewer.spec --clean --noconfirm
        if (Test-Path dist/vpid_viewer.exe) {
            Write-Host "Build successful: dist/vpid_viewer.exe"
            Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
        } else {
            Write-Error "Build failed: exe not found in dist/"
            exit 1
        }

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpid_viewer-dev-build
        path: dist/vpid_viewer.exe
        retention-days: 7
