name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python 3.5.4 (XP compatible)
      shell: powershell
      run: |
        $url = "https://www.python.org/ftp/python/3.5.4/python-3.5.4.exe"
        $installer = "$env:TEMP\python-3.5.4.exe"
        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
        Write-Host "Downloading Python 3.5.4 x86..."
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
        Write-Host "Installing Python 3.5.4..."
        Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python35 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
        if (Test-Path "C:\Python35\python.exe") {
            Write-Host "Python 3.5.4 installed successfully"
            & "C:\Python35\python.exe" --version
        } else {
            Write-Error "Python 3.5.4 installation failed"
            exit 1
        }

    - name: Add Python 3.5 to PATH
      shell: powershell
      run: |
        "C:\Python35" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        "C:\Python35\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Upgrade pip
      run: python -m pip install --upgrade pip==20.3.4

    - name: Install dependencies
      run: |
        python -m pip install -r requirements.txt
        python -m pip install pyinstaller==3.6

    - name: Check Python syntax
      run: |
        python -m py_compile main.py
        python -m py_compile src/__init__.py
        python -m py_compile src/device_info.py
        python -m py_compile src/usb_scanner.py
        python -m py_compile src/gui/__init__.py
        python -m py_compile src/gui/main_window.py
        python -m py_compile src/gui/device_list.py
        python -m py_compile src/gui/device_detail.py

    - name: Verify imports
      run: |
        python -c "from src.device_info import USBDevice; print('device_info OK')"
        python -c "from src.usb_scanner import scan_usb_devices, compare_devices; print('usb_scanner OK')"
        python -c "from src.gui.main_window import MainWindow; print('main_window OK')"
        python -c "from src.gui.device_list import DeviceListPanel; print('device_list OK')"
        python -c "from src.gui.device_detail import DeviceDetailPanel; print('device_detail OK')"

    - name: Build with PyInstaller
      run: pyinstaller vpid_viewer.spec --clean --noconfirm

    - name: Verify build output
      shell: pwsh
      run: |
        if (Test-Path dist/vpid_viewer.exe) {
            Write-Host "Build successful"
            Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
        } else {
            Write-Error "Build failed: exe not found"
            exit 1
        }

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: vpid_viewer-ci-xp-win32
        path: dist/vpid_viewer.exe
        retention-days: 7
