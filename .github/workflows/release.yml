name: Release

on:
  push:
    branches: [main]

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86
          - os: windows-latest
            platform_id: windows_x86
            ext: .exe
            python: "3.8.20"
            pyinstaller: "4.10"

          # Windows ARM64
          - os: windows-11-arm
            platform_id: windows_arm64
            ext: .exe
            python: "3.11"
            pyinstaller: "6.11.0"

          # Linux (Alpine + musl, zero glibc dependency)
          - os: ubuntu-latest
            platform_id: linux_amd64
            ext: ""
            container: "alpine:3.19"

          - os: ubuntu-24.04-arm
            platform_id: linux_arm64
            ext: ""
            container: "alpine:3.19"

          # Linux LoongArch64 (community QEMU + Alpine)
          - os: ubuntu-latest
            platform_id: linux_loong64
            ext: ""
            container: "ghcr.io/loong64/alpine:3.23"
            qemu: true

          # macOS
          - os: macos-13
            platform_id: macos_amd64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"

          - os: macos-14
            platform_id: macos_arm64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Windows / macOS: 原生构建
      - name: Set up Python
        if: contains(matrix.platform_id, 'windows') || contains(matrix.platform_id, 'macos')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies (Native)
        if: contains(matrix.platform_id, 'windows') || contains(matrix.platform_id, 'macos')
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==${{ matrix.pyinstaller }}

      - name: Build (Native)
        if: contains(matrix.platform_id, 'windows') || contains(matrix.platform_id, 'macos')
        run: pyinstaller vpid_viewer.spec --clean --noconfirm

      # Linux: Alpine + musl 容器构建（零 glibc 依赖）
      - name: Set up QEMU (LoongArch64)
        if: matrix.qemu == true
        uses: docker/setup-qemu-action@v3
        with:
          platforms: loongarch64

      - name: Build Linux (Alpine musl)
        if: contains(matrix.platform_id, 'linux')
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.container }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            apk add --no-cache python3 py3-pip gcc musl-dev zlib-dev \
              linux-headers libusb-dev tk tk-dev
            pip3 install --break-system-packages pyinstaller pyusb libusb-package
            pyinstaller vpid_viewer.spec --clean --noconfirm
            # 在容器内完成重命名，避免宿主机权限问题
            mv dist/vpid_viewer dist/vpid_viewer_${{ matrix.platform_id }}

      # Windows: 在宿主机上重命名产物
      - name: Rename artifact (Windows)
        if: contains(matrix.platform_id, 'windows')
        shell: bash
        run: mv dist/vpid_viewer${{ matrix.ext }} dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}

      # macOS: 在宿主机上重命名产物
      - name: Rename artifact (macOS)
        if: contains(matrix.platform_id, 'macos')
        run: mv dist/vpid_viewer.app dist/vpid_viewer_${{ matrix.platform_id }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_id }}
          path: dist/vpid_viewer_${{ matrix.platform_id }}*
          retention-days: 30

  release:
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: artifacts/**/*
          generate_release_notes: true
