name: Release

on:
  push:
    branches: [main]

jobs:
  build-windows-x86:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-winx86
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_windows_x86.exe
          key: ${{ runner.os }}-artifact-winx86-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-winx86-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-winx86.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Cache Python 3.8.20 installation
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        id: cache-python
        uses: actions/cache@v4
        with:
          path: C:\Python38
          key: python-3.8.20-xp-ryatian-${{ runner.os }}-${{ runner.arch }}

      - name: Install Python 3.8.20 (XP compatible, community patch)
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true' && steps.cache-python.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://github.com/R-YaTian/CPython3.8.20WinXP/releases/download/v3.8.20_final/python-3.8.20-full.exe"
          $installer = "$env:TEMP\python-3.8.20-full.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Write-Host "Downloading Python 3.8.20 x86 (community XP patch)..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing Python 3.8.20..."
          Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python38 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
          if (Test-Path "C:\Python38\python.exe") {
              Write-Host "Python 3.8.20 installed successfully"
              & "C:\Python38\python.exe" --version
          } else {
              Write-Error "Python 3.8.20 installation failed"
              exit 1
          }

      - name: Add Python 3.8 to PATH
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          "C:\Python38" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Python38\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache pip dependencies
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Upgrade pip
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==4.10

      - name: Build executable with PyInstaller
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          pyinstaller vpid_viewer.spec --clean --noconfirm
          if (Test-Path dist/vpid_viewer.exe) {
              Write-Host "Build successful: dist/vpid_viewer.exe"
              Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
          } else {
              Write-Error "Build failed: exe not found in dist/"
              exit 1
          }

      - name: Rename artifact
        if: steps.cache-artifact-winx86.outputs.cache-hit != 'true'
        shell: bash
        run: mv dist/vpid_viewer.exe dist/vpid_viewer_windows_x86.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows_x86
          path: dist/vpid_viewer_windows_x86.exe
          retention-days: 30

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-winarm64
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_windows_arm64.exe
          key: ${{ runner.os }}-artifact-winarm64-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-winarm64-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-winarm64.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Set up Python
        if: steps.cache-artifact-winarm64.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.cache-artifact-winarm64.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.0

      - name: Build with PyInstaller
        if: steps.cache-artifact-winarm64.outputs.cache-hit != 'true'
        run: pyinstaller vpid_viewer.spec --clean --noconfirm

      - name: Rename artifact
        if: steps.cache-artifact-winarm64.outputs.cache-hit != 'true'
        shell: bash
        run: mv dist/vpid_viewer.exe dist/vpid_viewer_windows_arm64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows_arm64
          path: dist/vpid_viewer_windows_arm64.exe
          retention-days: 30

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-linuxamd64
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_linux_amd64
          key: ${{ runner.os }}-artifact-linuxamd64-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-linuxamd64-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-linuxamd64.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Cache Python build and pip packages
        if: steps.cache-artifact-linuxamd64.outputs.cache-hit != 'true'
        id: cache-linux
        uses: actions/cache@v4
        with:
          path: |
            .cache/python-build
            .cache/pip
          key: ${{ runner.os }}-linux-amd64-${{ hashFiles('requirements.txt', '.python-version') }}
          restore-keys: |
            ${{ runner.os }}-linux-amd64-

      - name: Build in Ubuntu 16.04 container
        if: steps.cache-artifact-linuxamd64.outputs.cache-hit != 'true'
        uses: addnab/docker-run-action@v3
        with:
          image: ubuntu:16.04
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # Set up cache directories
            mkdir -p /workspace/.cache/python-build
            mkdir -p /workspace/.cache/pip
            export PIP_CACHE_DIR=/workspace/.cache/pip

            apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
                build-essential git curl libssl-dev zlib1g-dev libbz2-dev \
                libreadline-dev libsqlite3-dev wget libncurses5-dev \
                libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev patchelf

            # Check if Python is already cached
            if [ -f /workspace/.cache/python-build/python3.8.installed ]; then
                echo "Using cached Python 3.8"
                tar -xzf /workspace/.cache/python-build/python3.8.tgz -C /
            else
                echo "Building Python 3.8 from source"
                cd /tmp
                curl -O https://www.python.org/ftp/python/3.8.20/Python-3.8.20.tgz
                tar -xzf Python-3.8.20.tgz
                cd Python-3.8.20
                ./configure --enable-shared --enable-optimizations --with-ensurepip=install
                make -j$(nproc)
                make altinstall
                
                # Cache the Python installation
                cd /usr/local
                tar -czf /workspace/.cache/python-build/python3.8.tgz bin/python3.8 lib/libpython3.8* include/python3.8
                touch /workspace/.cache/python-build/python3.8.installed
            fi

            echo "/usr/local/lib" > /etc/ld.so.conf.d/python3.8.conf
            ldconfig
            /usr/local/bin/python3.8 --version

            /usr/local/bin/python3.8 -m ensurepip --upgrade
            /usr/local/bin/python3.8 -m pip install --upgrade pip setuptools wheel
            cd /workspace
            /usr/local/bin/python3.8 -m pip install -r requirements.txt
            /usr/local/bin/python3.8 -m pip install pyinstaller==6.11.0
            /usr/local/bin/python3.8 -m PyInstaller vpid_viewer.spec --clean --noconfirm
            mv dist/vpid_viewer dist/vpid_viewer_linux_amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux_amd64
          path: dist/vpid_viewer_linux_amd64
          retention-days: 30

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-linuxarm64
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_linux_arm64
          key: ${{ runner.os }}-artifact-linuxarm64-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-linuxarm64-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-linuxarm64.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Set up QEMU for ARM64 emulation
        if: steps.cache-artifact-linuxarm64.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        if: steps.cache-artifact-linuxarm64.outputs.cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Cache Python build and pip packages (ARM64)
        if: steps.cache-artifact-linuxarm64.outputs.cache-hit != 'true'
        id: cache-linux-arm64
        uses: actions/cache@v4
        with:
          path: |
            .cache/python-build-arm64
            .cache/pip-arm64
          key: ${{ runner.os }}-linux-arm64-${{ hashFiles('requirements.txt', '.python-version') }}
          restore-keys: |
            ${{ runner.os }}-linux-arm64-

      - name: Build in Ubuntu 16.04 container (ARM64)
        if: steps.cache-artifact-linuxarm64.outputs.cache-hit != 'true'
        uses: addnab/docker-run-action@v3
        with:
          image: ubuntu:16.04
          options: --platform linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # Set up cache directories
            mkdir -p /workspace/.cache/python-build-arm64
            mkdir -p /workspace/.cache/pip-arm64
            export PIP_CACHE_DIR=/workspace/.cache/pip-arm64

            apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
                build-essential git curl libssl-dev zlib1g-dev libbz2-dev \
                libreadline-dev libsqlite3-dev wget libncurses5-dev \
                libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev patchelf

            # Check if Python is already cached
            if [ -f /workspace/.cache/python-build-arm64/python3.8.installed ]; then
                echo "Using cached Python 3.8 (ARM64)"
                tar -xzf /workspace/.cache/python-build-arm64/python3.8.tgz -C /
            else
                echo "Building Python 3.8 from source (ARM64)"
                cd /tmp
                curl -O https://www.python.org/ftp/python/3.8.20/Python-3.8.20.tgz
                tar -xzf Python-3.8.20.tgz
                cd Python-3.8.20
                ./configure --enable-shared --enable-optimizations --with-ensurepip=install
                make -j$(nproc)
                make altinstall
                
                # Cache the Python installation
                cd /usr/local
                tar -czf /workspace/.cache/python-build-arm64/python3.8.tgz bin/python3.8 lib/libpython3.8* include/python3.8
                touch /workspace/.cache/python-build-arm64/python3.8.installed
            fi

            echo "/usr/local/lib" > /etc/ld.so.conf.d/python3.8.conf
            ldconfig
            /usr/local/bin/python3.8 --version

            /usr/local/bin/python3.8 -m ensurepip --upgrade
            /usr/local/bin/python3.8 -m pip install --upgrade pip setuptools wheel
            cd /workspace
            /usr/local/bin/python3.8 -m pip install -r requirements.txt
            /usr/local/bin/python3.8 -m pip install pyinstaller==6.11.0
            /usr/local/bin/python3.8 -m PyInstaller vpid_viewer.spec --clean --noconfirm
            mv dist/vpid_viewer dist/vpid_viewer_linux_arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux_arm64
          path: dist/vpid_viewer_linux_arm64
          retention-days: 30

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-macosamd64
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_macos_amd64.app
          key: ${{ runner.os }}-artifact-macosamd64-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-macosamd64-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-macosamd64.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Set up Python
        if: steps.cache-artifact-macosamd64.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.cache-artifact-macosamd64.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.0

      - name: Build with PyInstaller
        if: steps.cache-artifact-macosamd64.outputs.cache-hit != 'true'
        run: pyinstaller vpid_viewer.spec --clean --noconfirm

      - name: Rename artifact
        if: steps.cache-artifact-macosamd64.outputs.cache-hit != 'true'
        run: mv dist/vpid_viewer.app dist/vpid_viewer_macos_amd64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos_amd64
          path: dist/vpid_viewer_macos_amd64.app
          retention-days: 30

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache final build artifact
        id: cache-artifact-macosarm64
        uses: actions/cache@v4
        with:
          path: dist/vpid_viewer_macos_arm64.app
          key: ${{ runner.os }}-artifact-macosarm64-${{ hashFiles('src/**', 'vpid_viewer.spec', 'requirements.txt', '.python-version', 'icons/**') }}
          restore-keys: |
            ${{ runner.os }}-artifact-macosarm64-

      - name: Skip build if artifact exists
        if: steps.cache-artifact-macosarm64.outputs.cache-hit == 'true'
        run: echo "Using cached artifact, skipping build"

      - name: Set up Python
        if: steps.cache-artifact-macosarm64.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.cache-artifact-macosarm64.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.0

      - name: Build with PyInstaller
        if: steps.cache-artifact-macosarm64.outputs.cache-hit != 'true'
        run: pyinstaller vpid_viewer.spec --clean --noconfirm

      - name: Rename artifact
        if: steps.cache-artifact-macosarm64.outputs.cache-hit != 'true'
        run: mv dist/vpid_viewer.app dist/vpid_viewer_macos_arm64.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos_arm64
          path: dist/vpid_viewer_macos_arm64.app
          retention-days: 30

  release:
    needs:
      - build-windows-x86
      - build-windows-arm64
      - build-linux-amd64
      - build-linux-arm64
      - build-macos-amd64
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: artifacts/**/*
          generate_release_notes: true
