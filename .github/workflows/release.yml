name: Release

on:
  push:
    branches: [main]

jobs:
  build-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86 (XP compatible)
          - os: windows-latest
            platform_id: windows_x86
            ext: .exe
            python: "3.8.20"
            pyinstaller: "4.10"

          # Windows ARM64
          - os: windows-11-arm
            platform_id: windows_arm64
            ext: .exe
            python: "3.11"
            pyinstaller: "6.11.0"

          # Linux (manylinux2014, glibc 2.17 compatible)
          - os: ubuntu-latest
            platform_id: linux_amd64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"
            container: quay.io/pypa/manylinux2014_x86_64
            arch: amd64

          - os: ubuntu-latest
            platform_id: linux_arm64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"
            runner: ubuntu-latest-24.04-arm
            container: quay.io/pypa/manylinux2014_aarch64
            arch: arm64

          # Linux LoongArch64 (暂不支持，因为没有官方 runner)
          # - os: ubuntu-latest
          #   platform_id: linux_loong64
          #   ext: ""
          #   qemu: true

          # macOS
          - os: macos-13
            platform_id: macos_amd64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"

          - os: macos-14
            platform_id: macos_arm64
            ext: ""
            python: "3.11"
            pyinstaller: "6.11.0"

    runs-on: ${{ matrix.runner || matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Windows x86: 使用 XP 兼容的 Python 3.8.20 社区补丁版
      - name: Cache Python 3.8.20 installation
        if: matrix.platform_id == 'windows_x86'
        id: cache-python
        uses: actions/cache@v4
        with:
          path: C:\Python38
          key: python-3.8.20-xp-${{ runner.os }}-${{ runner.arch }}

      - name: Install Python 3.8.20 (XP compatible, community patch)
        if: matrix.platform_id == 'windows_x86' && steps.cache-python.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://raw.githubusercontent.com/adang1345/PythonVista/master/3.8.20/python-3.8.20-full.exe"
          $installer = "$env:TEMP\python-3.8.20-full.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Write-Host "Downloading Python 3.8.20 x86 (community XP patch)..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing Python 3.8.20..."
          Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python38 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
          if (Test-Path "C:\Python38\python.exe") {
              Write-Host "Python 3.8.20 installed successfully"
              & "C:\Python38\python.exe" --version
          } else {
              Write-Error "Python 3.8.20 installation failed"
              exit 1
          }

      - name: Add Python 3.8 to PATH
        if: matrix.platform_id == 'windows_x86'
        shell: powershell
        run: |
          "C:\Python38" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Python38\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache pip dependencies (Windows x86)
        if: matrix.platform_id == 'windows_x86'
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Upgrade pip (Windows x86)
        if: matrix.platform_id == 'windows_x86'
        run: python -m pip install --upgrade pip

      - name: Install dependencies (Windows x86)
        if: matrix.platform_id == 'windows_x86'
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==${{ matrix.pyinstaller }}

      - name: Build Windows x86
        if: matrix.platform_id == 'windows_x86'
        shell: pwsh
        run: |
          pyinstaller vpid_viewer.spec --clean --noconfirm
          if (Test-Path dist/vpid_viewer.exe) {
              Write-Host "Build successful: dist/vpid_viewer.exe"
              Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
          } else {
              Write-Error "Build failed: exe not found in dist/"
              exit 1
          }

      # Windows ARM64 / macOS: 原生构建
      - name: Set up Python (Windows ARM64 / macOS)
        if: matrix.platform_id != 'windows_x86' && !startsWith(matrix.platform_id, 'linux_')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies (Windows ARM64 / macOS)
        if: matrix.platform_id != 'windows_x86' && !startsWith(matrix.platform_id, 'linux_')
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==${{ matrix.pyinstaller }}

      - name: Build Windows ARM64 / macOS
        if: matrix.platform_id != 'windows_x86' && !startsWith(matrix.platform_id, 'linux_')
        run: |
          pyinstaller vpid_viewer.spec --clean --noconfirm

      # Linux: manylinux2014 容器内构建
      - name: Build Linux in manylinux2014 container
        if: startsWith(matrix.platform_id, 'linux_')
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.container }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # 使用 manylinux2014 预编译的 Python 3.11
            export PATH="/opt/python/cp311-cp311/bin:$PATH"
            python3 --version
            pip3 --version
            # 安装编译工具
            yum install -y gcc git make binutils patchelf
            # 安装依赖
            pip3 install --upgrade pip
            pip3 install -r requirements.txt
            pip3 install pyinstaller==${{ matrix.pyinstaller }}
            # 构建
            pyinstaller vpid_viewer.spec --clean --noconfirm
            mv dist/vpid_viewer dist/vpid_viewer_${{ matrix.platform_id }}

      # 重命名产物
      - name: Rename artifact (Windows)
        if: contains(matrix.platform_id, 'windows')
        shell: bash
        run: mv dist/vpid_viewer${{ matrix.ext }} dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}

      - name: Rename artifact (macOS)
        if: contains(matrix.platform_id, 'macos')
        run: mv dist/vpid_viewer.app dist/vpid_viewer_${{ matrix.platform_id }}.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform_id }}
          path: dist/vpid_viewer_${{ matrix.platform_id }}*
          retention-days: 30

  release:
    needs: build-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          files: artifacts/**/*
          generate_release_notes: true
