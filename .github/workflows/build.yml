name: Build

on:
  push:
    branches-ignore: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86
            platform_id: windows_x86
            ext: .exe

          - os: ubuntu-latest
            arch: amd64
            platform_id: linux_amd64
            ext: ""
            container: "ubuntu:18.04"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Windows x86: 使用 XP 兼容的 Python 3.8.20 社区补丁版
      - name: Cache Python 3.8.20 installation
        if: contains(matrix.platform_id, 'windows')
        id: cache-python
        uses: actions/cache@v4
        with:
          path: C:\Python38
          key: python-3.8.20-xp-${{ runner.os }}-${{ runner.arch }}

      - name: Install Python 3.8.20 (XP compatible, community patch)
        if: contains(matrix.platform_id, 'windows') && steps.cache-python.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          $url = "https://raw.githubusercontent.com/adang1345/PythonVista/master/3.8.20/python-3.8.20-full.exe"
          $installer = "$env:TEMP\python-3.8.20-full.exe"
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Write-Host "Downloading Python 3.8.20 x86 (community XP patch)..."
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Installing Python 3.8.20..."
          Start-Process -FilePath $installer -ArgumentList '/quiet InstallAllUsers=0 TargetDir=C:\Python38 Include_pip=1 Include_launcher=0' -Wait -NoNewWindow
          if (Test-Path "C:\Python38\python.exe") {
              Write-Host "Python 3.8.20 installed successfully"
              & "C:\Python38\python.exe" --version
          } else {
              Write-Error "Python 3.8.20 installation failed"
              exit 1
          }

      - name: Add Python 3.8 to PATH
        if: contains(matrix.platform_id, 'windows')
        shell: powershell
        run: |
          "C:\Python38" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Python38\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Cache pip dependencies
        if: contains(matrix.platform_id, 'windows')
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Upgrade pip
        if: contains(matrix.platform_id, 'windows')
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        if: contains(matrix.platform_id, 'windows')
        run: |
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==4.10

      - name: Build executable with PyInstaller
        if: contains(matrix.platform_id, 'windows')
        shell: pwsh
        run: |
          pyinstaller vpid_viewer.spec --clean --noconfirm
          if (Test-Path dist/vpid_viewer.exe) {
              Write-Host "Build successful: dist/vpid_viewer.exe"
              Get-Item dist/vpid_viewer.exe | Select-Object Name, Length, LastWriteTime
          } else {
              Write-Error "Build failed: exe not found in dist/"
              exit 1
          }

      # Linux AMD64: Ubuntu 18.04 容器构建（glibc 2.27 兼容）
      - name: Build Linux in Ubuntu 18.04 container
        if: contains(matrix.platform_id, 'linux')
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.container }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            # 更新 apt 源并安装编译依赖
            apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
                build-essential git curl libssl-dev zlib1g-dev libbz2-dev \
                libreadline-dev libsqlite3-dev wget llvm libncurses5-dev \
                libncursesw5-dev xz-utils tk-dev libffi-dev liblzma-dev patchelf
            # 从源码编译 Python 3.11（带共享库）
            cd /tmp
            curl -O https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz
            tar -xzf Python-3.11.9.tgz
            cd Python-3.11.9
            ./configure --enable-shared --enable-optimizations --with-ensurepip=install
            make -j$(nproc)
            make altinstall
            # 配置共享库路径
            echo "/usr/local/lib" > /etc/ld.so.conf.d/python3.11.conf
            ldconfig
            # 验证 Python 和共享库
            /usr/local/bin/python3.11 --version
            ldconfig -p | grep python3.11
            # 安装 pip 和依赖
            /usr/local/bin/python3.11 -m ensurepip --upgrade
            /usr/local/bin/python3.11 -m pip install --upgrade pip setuptools wheel
            # 构建项目
            cd /workspace
            /usr/local/bin/python3.11 -m pip install -r requirements.txt
            /usr/local/bin/python3.11 -m pip install pyinstaller
            /usr/local/bin/python3.11 -m PyInstaller vpid_viewer.spec --clean --noconfirm
            mv dist/vpid_viewer dist/vpid_viewer_${{ matrix.platform_id }}

      - name: Rename artifact
        if: contains(matrix.platform_id, 'windows')
        shell: bash
        run: mv dist/vpid_viewer${{ matrix.ext }} dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid_viewer-${{ matrix.platform_id }}-${{ github.sha }}
          path: dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}
          retention-days: 7
