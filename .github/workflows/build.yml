name: Build

on:
  push:
    branches-ignore: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            arch: x86
            python: "3.8.20"
            platform_id: windows_x86
            ext: .exe

          - os: ubuntu-latest
            arch: amd64
            platform_id: linux_amd64
            ext: ""
            container: "alpine:3.19"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        if: contains(matrix.platform_id, 'windows')
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        if: contains(matrix.platform_id, 'windows')
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==4.10

      - name: Build Windows x86
        if: contains(matrix.platform_id, 'windows')
        run: pyinstaller vpid_viewer.spec --clean --noconfirm

      # Linux AMD64: Alpine + musl 容器构建
      - name: Build Linux AMD64 (Alpine musl)
        if: contains(matrix.platform_id, 'linux')
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.container }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            apk add --no-cache python3 py3-pip gcc musl-dev zlib-dev \
              linux-headers libusb-dev tk tk-dev
            pip3 install --break-system-packages pyinstaller pyusb libusb-package
            pyinstaller vpid_viewer.spec --clean --noconfirm
            # 在容器内完成重命名，避免宿主机权限问题
            mv dist/vpid_viewer dist/vpid_viewer_${{ matrix.platform_id }}

      - name: Rename artifact
        if: contains(matrix.platform_id, 'windows')
        shell: bash
        run: mv dist/vpid_viewer${{ matrix.ext }} dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpid_viewer-${{ matrix.platform_id }}-${{ github.sha }}
          path: dist/vpid_viewer_${{ matrix.platform_id }}${{ matrix.ext }}
          retention-days: 7
